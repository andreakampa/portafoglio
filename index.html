<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Portfolio Manager - Versione Ripristinata</title>
    <style>
        :root { --bg: #0b0e14; --card: #151921; --text: #e1e1e6; --accent: #3d8aff; --border: #2d303e; --pos: #00c853; --neg: #ff3d00; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .stat-card { background: var(--card); padding: 15px; border-radius: 10px; border: 1px solid var(--border); }
        .value { font-size: 1.4rem; font-weight: bold; margin-top: 5px; }
        table { width: 100%; border-collapse: collapse; background: var(--card); border-radius: 10px; overflow: hidden; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid var(--border); }
        th { color: #8899a6; font-size: 0.8rem; text-transform: uppercase; }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .modal { background: var(--card); padding: 25px; border-radius: 15px; width: 300px; border: 1px solid var(--border); }
        input, select { width: 100%; padding: 10px; margin: 10px 0; background: #1c212c; border: 1px solid var(--border); color: white; border-radius: 5px; box-sizing: border-box; }
        .btn { cursor: pointer; padding: 10px; border: none; border-radius: 5px; font-weight: bold; }
        .btn-main { background: var(--accent); color: white; width: 100%; }
    </style>
</head>
<body>

<div id="login-screen" class="overlay">
    <div class="modal">
        <h3 style="margin-top:0">Sblocca Portafoglio</h3>
        <input type="password" id="pass" placeholder="Password">
        <button class="btn btn-main" onclick="login()">Entra</button>
    </div>
</div>

<div id="main-app" class="container" style="display:none">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px">
        <div id="status">Connessione...</div>
        <button class="btn" style="background:#2d303e; color:white" onclick="document.getElementById('add-modal').style.display='flex'">+ Aggiungi Titolo</button>
    </div>

    <div class="dashboard">
        <div class="stat-card"><h3>Investito</h3><div id="tot-inv" class="value">0</div></div>
        <div class="stat-card"><h3>Valore Attuale</h3><div id="tot-lordo" class="value">0</div></div>
        <div class="stat-card" style="border-left: 4px solid var(--accent)"><h3>Netto stimato</h3><div id="tot-netto" class="value" style="color:var(--accent)">0</div></div>
    </div>

    <table>
        <thead>
            <tr>
                <th>Ticker</th>
                <th>Quantità</th>
                <th>PMC</th>
                <th>Prezzo Live</th>
                <th>Lordo</th>
                <th>Netto (Tax)</th>
                <th>P&L</th>
            </tr>
        </thead>
        <tbody id="table-body"></tbody>
    </table>
</div>

<div id="add-modal" class="overlay" style="display:none">
    <div class="modal">
        <h3>Nuovo Titolo</h3>
        <input type="text" id="t-ticker" placeholder="es: RACE.MI">
        <input type="number" id="t-qta" placeholder="Quantità">
        <input type="number" id="t-prezzo" placeholder="Prezzo">
        <select id="t-tax"><option value="0.26">Azioni (26%)</option><option value="0.125">Titoli Stato (12.5%)</option></select>
        <button class="btn btn-main" onclick="aggiungi()">Salva</button>
        <button class="btn" style="width:100%; margin-top:5px; background:transparent; color:white" onclick="this.parentElement.parentElement.style.display='none'">Annulla</button>
    </div>
</div>

<script>
    // Recupero configurazione
    const CFG = JSON.parse(localStorage.getItem('portfolio_config'));
    let data = {};
    let prices = {};

    function login() {
        const p = document.getElementById('pass').value;
        if(CFG && p === CFG.password) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            init();
        } else { alert("Password errata"); }
    }

    async function init() {
        await loadData();
        await updatePrices();
        render();
    }

    async function loadData() {
        // Proviamo a caricare il database originale
        try {
            const r = await fetch(CFG.dbUrl + "portafoglio.json");
            if(r.ok) data = await r.json() || {};
            else {
                // Se non esiste, proviamo v2
                const r2 = await fetch(CFG.dbUrl + "portafoglio_v2.json");
                if(r2.ok) data = await r2.json() || {};
            }
        } catch(e) { console.error("Errore caricamento"); }
    }

    async function updatePrices() {
        const tickers = Object.keys(data);
        for(let id of tickers) {
            try {
                const t = data[id].ticker;
                const r = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent('https://query1.finance.yahoo.com/v8/finance/chart/' + t)}`);
                const d = await r.json();
                const json = JSON.parse(d.contents);
                prices[id] = json.chart.result[0].meta.regularMarketPrice;
            } catch(e) { prices[id] = data[id].prezzoCarico || 0; }
        }
        document.getElementById('status').innerText = "Prezzi aggiornati alle " + new Date().toLocaleTimeString();
    }

    function render() {
        const body = document.getElementById('table-body');
        body.innerHTML = '';
        let invTot = 0, lordoTot = 0, nettoTot = 0;

        Object.keys(data).forEach(id => {
            const item = data[id];
            const qta = parseFloat(item.quantita || 0);
            const pmc = parseFloat(item.prezzoCarico || 0);
            const live = prices[id] || pmc;
            
            const lordo = qta * live;
            const investito = qta * pmc;
            const pnl = lordo - investito;
            
            // Calcolo tasse (stima semplificata)
            const taxRate = parseFloat(item.tax || 0.26);
            const tasse = pnl > 0 ? pnl * taxRate : 0;
            const netto = lordo - tasse - 7; // 7€ commissione stimata vendita

            invTot += investito;
            lordoTot += lordo;
            nettoTot += netto;

            body.innerHTML += `
                <tr>
                    <td><b>${item.ticker}</b></td>
                    <td>${qta}</td>
                    <td>€ ${pmc.toFixed(2)}</td>
                    <td>€ ${live.toFixed(2)}</td>
                    <td>€ ${lordo.toLocaleString()}</td>
                    <td style="color:var(--accent)">€ ${netto.toLocaleString()}</td>
                    <td style="color:${pnl>=0?'var(--pos)':'var(--neg)'}">${pnl.toFixed(2)}</td>
                </tr>
            `;
        });

        document.getElementById('tot-inv').innerText = "€ " + invTot.toLocaleString();
        document.getElementById('tot-lordo').innerText = "€ " + lordoTot.toLocaleString();
        document.getElementById('tot-netto').innerText = "€ " + nettoTot.toLocaleString();
    }

    async function aggiungi() {
        const id = "ID" + Date.now();
        data[id] = {
            ticker: document.getElementById('t-ticker').value.toUpperCase(),
            quantita: document.getElementById('t-qta').value,
            prezzoCarico: document.getElementById('t-prezzo').value,
            tax: document.getElementById('t-tax').value
        };
        await fetch(CFG.dbUrl + "portafoglio.json", { method: 'PUT', body: JSON.stringify(data) });
        document.getElementById('add-modal').style.display='none';
        init();
    }
</script>
</body>
</html>
