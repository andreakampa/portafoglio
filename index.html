<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Manager - Restore Version</title>
    <style>
        :root {
            --bg: #0b0e14; --card: #151921; --text: #e1e1e6; --text-dim: #8899a6;
            --accent: #3d8aff; --success: #00c853; --danger: #ff3d00; --border: #2d303e;
        }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 1300px; margin: 0 auto; }
        .dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 15px; margin-bottom: 25px; }
        .stat-card { background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid var(--border); }
        .stat-card h3 { margin: 0; font-size: 0.7rem; color: var(--text-dim); text-transform: uppercase; }
        .stat-card .value { font-size: 1.5rem; font-weight: 700; margin: 8px 0; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .btn { padding: 8px 16px; border-radius: 6px; border: none; cursor: pointer; font-weight: 600; font-size: 0.8rem; transition: 0.2s; }
        .btn-primary { background: var(--accent); color: white; }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
        .card-table { background: var(--card); border-radius: 12px; border: 1px solid var(--border); overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 900px; }
        th { padding: 15px; color: var(--text-dim); font-size: 0.7rem; text-transform: uppercase; text-align: left; border-bottom: 1px solid var(--border); }
        td { padding: 15px; border-bottom: 1px solid var(--border); font-size: 0.9rem; }
        .pos { color: var(--success); } .neg { color: var(--danger); }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 9999; }
        .modal { background: var(--card); padding: 25px; border-radius: 15px; width: 90%; max-width: 500px; border: 1px solid var(--border); }
        input, select { background: #1c212c; border: 1px solid var(--border); color: white; padding: 10px; border-radius: 6px; width: 100%; margin: 8px 0 15px 0; box-sizing: border-box; }
    </style>
</head>
<body>

<div id="login-overlay" class="overlay" style="display: flex;">
    <div class="modal" style="text-align: center; max-width: 300px;">
        <h2>Bentornato</h2>
        <input type="password" id="login-password" placeholder="Password">
        <button class="btn btn-primary" style="width:100%" onclick="verificaLogin()">Sblocca</button>
    </div>
</div>

<div id="app-content" class="container" style="display:none;">
    <div class="top-bar">
        <div>
            <span id="exchange-info" style="font-size: 0.8rem; color: var(--text-dim);">EUR/USD: --</span>
            <span id="status-indicator" style="font-size: 0.7rem; margin-left:10px; color: var(--accent);">In attesa...</span>
        </div>
        <div style="display:flex; gap: 8px;">
            <button class="btn btn-outline" onclick="toggleValuta('EUR')">€</button>
            <button class="btn btn-outline" onclick="toggleValuta('USD')">$</button>
            <button class="btn btn-primary" onclick="apriModaleNuovo()">+ Nuovo Titolo</button>
        </div>
    </div>

    <div class="dashboard">
        <div class="stat-card"><h3>Investito</h3><div id="dash-investito" class="value">--</div></div>
        <div class="stat-card"><h3>Valore Lordo</h3><div id="dash-lordo" class="value">--</div></div>
        <div class="stat-card" style="border-top: 2px solid var(--accent);"><h3>Netto (After-Tax)</h3><div id="dash-netto" class="value" style="color:var(--accent)">--</div></div>
        <div class="stat-card"><h3>P&L Realizzato</h3><div id="dash-realizzato" class="value">--</div></div>
    </div>

    <div class="card-table">
        <table>
            <thead>
                <tr>
                    <th>Titolo</th>
                    <th>Quantità</th>
                    <th>PMC</th>
                    <th>Prezzo Live</th>
                    <th>Lordo</th>
                    <th>Netto After-Tax</th>
                    <th>P&L Lordo</th>
                    <th style="text-align:right">Azioni</th>
                </tr>
            </thead>
            <tbody id="corpo-tabella"></tbody>
        </table>
    </div>
</div>

<div id="modal-titolo" class="overlay"><div class="modal">
    <h3>Gestisci Titolo</h3>
    <input type="text" id="in-ticker" placeholder="Ticker (es: RACE.MI)">
    <select id="in-tipo">
        <option value="0.26">Azioni/ETF/Crypto (26%)</option>
        <option value="0.125">Titoli di Stato (12.5%)</option>
    </select>
    <select id="in-valuta">
        <option value="EUR">Euro (€)</option>
        <option value="USD">Dollaro ($)</option>
    </select>
    <button class="btn btn-primary" style="width:100%" onclick="salvaTitolo()">Salva</button>
    <button class="btn btn-outline" style="width:100%; margin-top:10px" onclick="chiudiModali()">Chiudi</button>
</div></div>

<div id="modal-tx" class="overlay"><div class="modal">
    <h3 id="tx-titolo-label">Transazioni</h3>
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
        <select id="tx-tipo"><option value="BUY">Acquisto</option><option value="SELL">Vendita</option></select>
        <input type="date" id="tx-data">
        <input type="number" id="tx-qta" placeholder="Quantità">
        <input type="number" id="tx-prezzo" placeholder="Prezzo">
        <input type="number" id="tx-comm" value="7.00" placeholder="Commissione">
    </div>
    <button class="btn btn-primary" style="width:100%; margin-top:10px" onclick="aggiungiTransazione()">Registra</button>
    <div id="tx-history" style="margin-top:15px; max-height: 200px; overflow-y:auto; border-top: 1px solid #333; padding-top:10px;"></div>
    <button class="btn btn-outline" style="width:100%; margin-top:10px" onclick="chiudiModali()">Chiudi</button>
</div></div>

<script>
    let CONFIG = JSON.parse(localStorage.getItem('portfolio_config'));
    let portafoglio = {}; let prezziLive = {};
    let cambioEURUSD = 1.08; let visualizzaIn = 'EUR'; let activeId = null;

    function verificaLogin() {
        if(document.getElementById('login-password').value === CONFIG.password) {
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('app-content').style.display = 'block';
            avviaApp();
        } else alert("Password errata");
    }

    async function avviaApp() {
        await aggiornaCambio();
        await caricaDati();
        await aggiornaPrezzi();
        renderTabella();
    }

    async function aggiornaCambio() {
        try { const r = await fetch('https://open.er-api.com/v6/latest/EUR'); const d = await r.json(); cambioEURUSD = d.rates.USD; document.getElementById('exchange-info').innerText = "EUR/USD: " + cambioEURUSD.toFixed(4); } catch(e){}
    }

    async function caricaDati() {
        // PROVIAMO TUTTI I POSSIBILI NOMI FILE PER ESSERE SICURI DI TROVARE I TUOI DATI
        const files = ["portafoglio_v2.json", "portafoglio.json", "portafoglio_v3.json"];
        for (let file of files) {
            try {
                const r = await fetch(CONFIG.dbUrl + file);
                if (r.ok) {
                    const data = await r.json();
                    if (data && Object.keys(data).length > 0) {
                        portafoglio = data;
                        console.log("Dati caricati da: " + file);
                        return;
                    }
                }
            } catch(e) {}
        }
        portafoglio = {};
    }

    async function salvaDati() {
        // Salviamo sempre su v2 per consistenza con i tuoi vecchi dati
        await fetch(CONFIG.dbUrl + "portafoglio_v2.json", { method: 'PUT', body: JSON.stringify(portafoglio) });
        renderTabella();
    }

    async function aggiornaPrezzi() {
        const ids = Object.keys(portafoglio || {});
        if(ids.length === 0) return;
        document.getElementById('status-indicator').innerText = "Aggiornamento prezzi...";
        
        const promises = ids.map(id => {
            const t = portafoglio[id].ticker;
            return fetch(`https://api.allorigins.win/get?url=${encodeURIComponent('https://query1.finance.yahoo.com/v8/finance/chart/' + t)}`)
                .then(r => r.json()).then(d => {
                    const y = JSON.parse(d.contents);
                    prezziLive[id] = y.chart.result[0].meta.regularMarketPrice;
                }).catch(() => {});
        });
        await Promise.allSettled(promises);
        document.getElementById('status-indicator').innerText = "Dati Live OK";
    }

    function calcola(id) {
        let qta = 0, costo = 0, real = 0;
        // Se hai vecchi dati senza l'array transazioni, li convertiamo al volo
        if (!portafoglio[id].transazioni && portafoglio[id].quantita) {
            return { qta: parseFloat(portafoglio[id].quantita), pmc: parseFloat(portafoglio[id].prezzoCarico || 0), real: 0, inv: parseFloat(portafoglio[id].quantita * portafoglio[id].prezzoCarico) };
        }
        
        const txs = (portafoglio[id].transazioni || []).sort((a,b) => new Date(a.data) - new Date(b.data));
        txs.forEach(tx => {
            const q = parseFloat(tx.qta), p = parseFloat(tx.prezzo), c = parseFloat(tx.comm || 0);
            if(tx.tipo === 'BUY') { qta += q; costo += (q*p)+c; }
            else { const pmc = qta > 0 ? costo/qta : 0; real += (p*q)-(pmc*q)-c; costo -= (pmc*q); qta -= q; }
        });
        return { qta, pmc: qta > 0 ? costo/qta : 0, real, inv: costo };
    }

    function renderTabella() {
        const tbody = document.getElementById('corpo-tabella
