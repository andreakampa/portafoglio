<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portafoglio Tracker Pro</title>
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/layout.css">
</head>
<body>

<!-- AUTH SCREENS -->
<div id="setup-overlay" class="auth-overlay">
    <div class="auth-box">
        <div class="auth-logo">📈</div>
        <h2>Prima Configurazione</h2>
        <p>Inserisci l'URL del tuo Firebase Realtime Database e crea una password.</p>
        <input type="url" id="setup-db-url" placeholder="https://PROGETTO-default-rtdb.firebaseio.com/">
        <input type="password" id="setup-password" placeholder="Crea password (min. 4 caratteri)">
        <input type="password" id="setup-password2" placeholder="Conferma password">
        <div class="auth-error" id="setup-error"></div>
        <button class="btn btn-success btn-full" id="btn-setup-save">Salva e Continua</button>
    </div>
</div>

<div id="login-overlay" class="auth-overlay">
    <div class="auth-box">
        <div class="auth-logo">🔐</div>
        <h2>Portafoglio Tracker</h2>
        <p>Inserisci la password per accedere.</p>
        <input type="password" id="login-password" placeholder="Password">
        <div class="auth-error" id="login-error"></div>
        <button class="btn btn-accent btn-full" id="btn-login">Sblocca Portafoglio</button>
        <a class="reset-link" id="btn-reset-config">Riconfigura database</a>
    </div>
</div>

<!-- APP SHELL -->
<div id="app" style="display:none;">
    <nav class="navbar">
        <div class="navbar-brand">📈 Tracker Pro</div>
        <div class="navbar-links">
            <a class="nav-link active" data-page="portfolio">💼 Portafoglio</a>
            <a class="nav-link" data-page="settings">⚙️ Impostazioni</a>
        </div>
        <button class="navbar-logout" id="btn-logout" title="Esci">⏻</button>
    </nav>

    <main class="main-content" id="page-container">
        <!-- Pages injected here by router -->
    </main>
</div>

<div id="toast"></div>

<script type="module" src="js/app.js"></script>
</body>
</html>
