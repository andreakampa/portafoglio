<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Manager - Stable Restore</title>
    <style>
        :root {
            --bg: #0b0e14; --card: #151921; --text: #e1e1e6; --text-dim: #8899a6;
            --accent: #3d8aff; --success: #00c853; --danger: #ff3d00; --border: #2d303e;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 1300px; margin: 0 auto; }
        .dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 15px; margin-bottom: 25px; }
        .stat-card { background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid var(--border); }
        .stat-card h3 { margin: 0; font-size: 0.7rem; color: var(--text-dim); text-transform: uppercase; }
        .stat-card .value { font-size: 1.5rem; font-weight: 700; margin: 8px 0; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .btn { padding: 8px 16px; border-radius: 6px; border: none; cursor: pointer; font-weight: 600; font-size: 0.8rem; }
        .btn-primary { background: var(--accent); color: white; }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
        .card-table { background: var(--card); border-radius: 12px; border: 1px solid var(--border); overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 900px; }
        th { padding: 15px; color: var(--text-dim); font-size: 0.7rem; text-transform: uppercase; text-align: left; border-bottom: 1px solid var(--border); }
        td { padding: 15px; border-bottom: 1px solid var(--border); font-size: 0.9rem; }
        .pos { color: var(--success); } .neg { color: var(--danger); }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 9999; }
        .modal { background: var(--card); padding: 25px; border-radius: 15px; width: 90%; max-width: 500px; border: 1px solid var(--border); }
        input, select { background: #1c212c; border: 1px solid var(--border); color: white; padding: 12px; border-radius: 8px; width: 100%; margin: 8px 0 15px 0; box-sizing: border-box; }
    </style>
</head>
<body>

<div id="login-overlay" class="overlay" style="display: flex;">
    <div class="modal" style="text-align: center; max-width: 300px;">
        <h2>Sblocca Portafoglio</h2>
        <input type="password" id="login-password" placeholder="Password">
        <button class="btn btn-primary" style="width:100%" onclick="verificaLogin()">Entra</button>
    </div>
</div>

<div id="app-content" class="container" style="display:none;">
    <div class="top-bar">
        <div id="info-header" style="font-size: 0.8rem; color: var(--text-dim);">Connessione in corso...</div>
        <div style="display:flex; gap: 8px;">
            <button class="btn btn-outline" onclick="toggleValuta('EUR')">€ EUR</button>
            <button class="btn btn-outline" onclick="toggleValuta('USD')">$ USD</button>
            <button class="btn btn-primary" onclick="apriModaleNuovo()">+ Nuovo Titolo</button>
        </div>
    </div>

    <div class="dashboard">
        <div class="stat-card"><h3>Investito</h3><div id="dash-investito" class="value">--</div></div>
        <div class="stat-card"><h3>Lordo</h3><div id="dash-lordo" class="value">--</div></div>
        <div class="stat-card" style="border-top: 2px solid var(--accent);"><h3>Netto (After-Tax)</h3><div id="dash-netto" class="value" style="color:var(--accent)">--</div></div>
        <div class="stat-card"><h3>P&L Realizzato</h3><div id="dash-realizzato" class="value">--</div></div>
    </div>

    <div class="card-table">
        <table>
            <thead>
                <tr>
                    <th>Titolo</th>
                    <th>Q.tà</th>
                    <th>PMC</th>
                    <th>Prezzo Live</th>
                    <th>Lordo</th>
                    <th>Netto (Tax)</th>
                    <th>P&L</th>
                    <th style="text-align:right">Azioni</th>
                </tr>
            </thead>
            <tbody id="corpo-tabella"></tbody>
        </table>
    </div>
</div>

<div id="modal-titolo" class="overlay"><div class="modal">
    <h3>Gestione Titolo</h3>
    <input type="text" id="in-ticker" placeholder="Ticker (es: RACE.MI)">
    <label style="font-size:0.7rem">Tassazione</label>
    <select id="in-tax"><option value="0.26">26% (Azioni/ETF)</option><option value="0.125">12.5% (Titoli Stato)</option></select>
    <label style="font-size:0.7rem">Valuta</label>
    <select id="in-valuta"><option value="EUR">EUR (€)</option><option value="USD">USD ($)</option></select>
    <button class="btn btn-primary" style="width:100%; margin-top:10px" onclick="salvaTitolo()">Salva Titolo</button>
    <button class="btn btn-outline" style="width:100%; margin-top:10px" onclick="chiudiModali()">Annulla</button>
</div></div>

<div id="modal-tx" class="overlay"><div class="modal">
    <h3 id="tx-label">Transazioni</h3>
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
        <select id="tx-tipo"><option value="BUY">Acquisto</option><option value="SELL">Vendita</option></select>
        <input type="date" id="tx-data">
        <input type="number" id="tx-qta" placeholder="Q.tà">
        <input type="number" id="tx-prezzo" placeholder="Prezzo">
        <input type="number" id="tx-comm" value="7.00" placeholder="Comm. (€/$)">
    </div>
    <button class="btn btn-primary" style="width:100%; margin-top:10px" onclick="aggiungiTx()">Registra Operazione</button>
    <div id="tx-list" style="margin-top:15px; max-height: 200px; overflow-y:auto; border-top: 1px solid var(--border); padding-top:10px;"></div>
    <button class="btn btn-outline" style="width:100%; margin-top:10px" onclick="chiudiModali()">Chiudi</button>
</div></div>

<script>
    // Caricamento immediato della configurazione per evitare errori di puntatore
    const CONFIG = JSON.parse(localStorage.getItem('portfolio_config'));
    let portafoglio = {}; 
    let prezziLive = {};
    let cambioEURUSD = 1.08;
    let visualizzaIn = 'EUR';
    let activeId = null;

    function verificaLogin() {
        const pass = document.getElementById('login-password').value;
        if(CONFIG && pass === CONFIG.password) {
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('app-content').style.display = 'block';
            avviaApp();
        } else {
            alert("Password non corretta o configurazione mancante.");
        }
    }

    async function avviaApp() {
        await aggiornaCambio();
        await caricaDati();
        await aggiornaPrezzi();
        renderTabella();
    }

    async function aggiornaCambio() {
        try {
            const r = await fetch('https://open.er-api.com/v6/latest/EUR');
            const d = await r.json();
            cambioEURUSD = d.rates.USD;
        } catch(e) { console.error("Errore cambio"); }
    }

    async function caricaDati() {
        // PUNTATORE ORIGINALE: Cerchiamo portafoglio.json o portafoglio_v2.json
        const fileNames = ["portafoglio_v2.json", "portafoglio.json"];
        for(let f of fileNames) {
            try {
                const r = await fetch(CONFIG.dbUrl + f);
                if(r.ok) {
                    portafoglio = await r.json() || {};
                    document.getElementById('info-header').innerText = "Dati caricati con successo.";
                    return;
                }
            } catch(e) {}
        }
    }

    async function salvaDati() {
        await fetch(CONFIG.dbUrl + "portafoglio_v2.json", { method: 'PUT', body: JSON.stringify(portafoglio) });
        renderTabella();
    }

    async function aggiornaPrezzi() {
        const ids = Object.keys(portafoglio);
        const promises = ids.map(id => {
            const t = portafoglio[id].ticker;
            return fetch(`https://api.allorigins.win/get?url=${encodeURIComponent('https://query1.finance.yahoo.com/v8/finance/chart/' + t)}`)
                .then(r => r.json()).then(d => {
                    const y = JSON.parse(d.contents);
                    prezziLive[id] = y.chart.result[0].meta.regularMarketPrice;
                }).catch(() => {});
        });
        await Promise.allSettled(promises);
    }

    function calcolaMetriche(id) {
        let qta = 0, costo = 0, real = 0;
        // Gestione compatibilità vecchi dati
        if(!portafoglio[id].transazioni && portafoglio[id].quantita) {
            qta = parseFloat(portafoglio[id].quantita);
            costo = qta * parseFloat(portafoglio[id].prezzoCarico || 0);
            return { qta, pmc: costo/qta, real: 0, inv: costo };
        }
        
        const txs = (portafoglio[id].transazioni || []).sort((a,b) => new Date(a.data) - new Date(b.data));
        txs.forEach(tx => {
            const q = parseFloat(tx.qta), p = parseFloat(tx.prezzo), c = parseFloat(tx.comm || 0);
            if(tx.tipo === 'BUY') { qta += q; costo += (q*p)+c; }
            else { 
                const pmcLoc = qta > 0 ? costo/qta : 0;
                real += (p*q) - (pmcLoc*q) - c;
                costo -= (pmcLoc*q); qta -= q;
            }
        });
        return { qta, pmc: qta > 0 ? costo/qta : 0, real, inv: costo };
    }

    function renderTabella() {
        const tbody = document.getElementById('corpo-tabella'); tbody.innerHTML = '';
        let tInv = 0, tLordo = 0, tNetto = 0, tReal = 0;
        const s = visualizzaIn === 'EUR' ? '€' : '$';

        Object.keys(portafoglio).forEach(id => {
            const t = portafoglio[id], m = calcolaMetriche(id), live = prezziLive[id] || m.pmc;
            const val = t.valuta || 'EUR', lordo = m.qta * live, pnl = lordo - m.inv;
            const netto = lordo - (Math.max(0, pnl) * parseFloat(t.tax || 0.26)) - 7;

            tInv += converti(m.inv, val, visualizzaIn); 
            tLordo += converti(lordo, val, visualizzaIn);
            tNetto += converti(netto, val, visualizzaIn); 
            tReal += converti(m.real, val, visualizzaIn);

            tbody.innerHTML += `<tr>
                <td><b>${t.ticker}</b></td>
                <td>${m.qta.toFixed(2)}</td><td>${m.pmc.toFixed(2)}</td><td>${live.toFixed(2)}</td>
                <td>${s} ${converti(lordo,val,visualizzaIn).toLocaleString()}</td>
                <td style="color:var(--accent); font-weight:600">${s} ${converti(netto,val,visualizzaIn).toLocaleString()}</td>
                <td class="${pnl>=0?'pos':'neg'}">${converti(pnl,val,visualizzaIn).toFixed(2)}</td>
                <td style="text-align:right">
                    <button class="btn btn-outline" style="padding:4px 8px" onclick="apriTx('${id}')">Transazioni</button>
                    <button class="btn btn-outline" style="padding:4px 8px; color:var(--danger)" onclick="eliminaT('${id}')">🗑️</button>
                </td>
            </tr>`;
        });

        document.getElementById('dash-investito').innerText = s + " " + tInv.toLocaleString();
        document.getElementById('dash-lordo').innerText = s + " " + tLordo.toLocaleString();
        document.getElementById('dash-netto').innerText = s + " " + tNetto.toLocaleString();
        document.getElementById('dash-realizzato').innerText = s + " " + tReal.toLocaleString();
    }

    function converti(v, da, a) { return (da===a)?v : (da==='EUR'? v*cambioEURUSD : v/cambioEURUSD); }
    function apriModaleNuovo() { document.getElementById('modal-titolo').style.display='flex'; }
    function chiudiModali() { document.querySelectorAll('.overlay').forEach(o => o.style.display='none'); }
    
    async function salvaTitolo() {
        const tick = document.getElementById('in-ticker').value.toUpperCase(); if(!tick) return;
        const id = "ID" + Date.now();
        portafoglio[id] = { ticker: tick, transazioni: [], valuta: document.getElementById('in-valuta').value, tax: document.getElementById('in-tax').value };
        await salvaDati(); chiudiModali(); avviaApp();
    }

    function apriTx(id) { activeId = id; document.getElementById('tx-label').innerText = "Titolo: " + portafoglio[id].ticker; renderListTx(); document.getElementById('modal-tx').style.display='flex'; }
    function renderListTx() {
        const l = document.getElementById('tx-list'); l.innerHTML = '';
        (portafoglio[activeId].transazioni || []).forEach((tx, i) => {
            l.innerHTML += `<div style="display:flex; justify-content:space-between; font-size:0.7rem; padding:8px; border-bottom:1px solid #333">
                <span>${tx.tipo} ${tx.data}</span><span>${tx.qta}@${tx.prezzo}</span>
                <button onclick="eliminaTx(${i})" style="color:red; background:none; border:none; cursor:pointer">X</button>
            </div>`;
        });
    }

    async function aggiungiTx() {
        const q = document.getElementById('tx-qta').value, p = document.getElementById('tx-prezzo').value, d = document.getElementById('tx-data').value;
        if(!q || !p || !d) return;
        if(!portafoglio[activeId].transazioni) portafoglio[activeId].transazioni = [];
        portafoglio[activeId].transazioni.push({ tipo: document.getElementById('tx-tipo').value, data: d, qta: parseFloat(q), prezzo: parseFloat(p), comm: parseFloat(document.getElementById('tx-comm').value) });
        await salvaDati(); renderListTx();
    }
    async function eliminaTx(i) { portafoglio[activeId].transazioni.splice(i,1); await salvaDati(); renderListTx(); }
    async function eliminaT(id) { if(confirm("Eliminare il titolo?")) { delete portafoglio[id]; await salvaDati(); } }
    function toggleValuta(v) { visualizzaIn = v; renderTabella(); }
</script>
</body>
</html>
