<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Manager - Stable Version</title>
    <style>
        :root {
            --bg: #0b0e14; --card: #151921; --text: #e1e1e6; --text-dim: #8899a6;
            --accent: #3d8aff; --success: #00c853; --danger: #ff3d00; --border: #2d303e;
        }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 1300px; margin: 0 auto; }
        
        /* Dashboard */
        .dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 15px; margin-bottom: 25px; }
        .stat-card { background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid var(--border); }
        .stat-card h3 { margin: 0; font-size: 0.7rem; color: var(--text-dim); text-transform: uppercase; }
        .stat-card .value { font-size: 1.5rem; font-weight: 700; margin: 8px 0; }

        /* UI */
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .btn { padding: 8px 16px; border-radius: 6px; border: none; cursor: pointer; font-weight: 600; font-size: 0.8rem; }
        .btn-primary { background: var(--accent); color: white; }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
        
        /* Table */
        .card-table { background: var(--card); border-radius: 12px; border: 1px solid var(--border); overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 900px; }
        th { padding: 15px; color: var(--text-dim); font-size: 0.7rem; text-transform: uppercase; text-align: left; border-bottom: 1px solid var(--border); }
        td { padding: 15px; border-bottom: 1px solid var(--border); font-size: 0.9rem; }
        
        .pos { color: var(--success); }
        .neg { color: var(--danger); }

        /* Modal */
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 9999; }
        .modal { background: var(--card); padding: 25px; border-radius: 15px; width: 90%; max-width: 500px; border: 1px solid var(--border); }
        input, select { background: #1c212c; border: 1px solid var(--border); color: white; padding: 10px; border-radius: 6px; width: 100%; margin: 8px 0 15px 0; box-sizing: border-box; }
        
        #status-indicator { font-size: 0.7rem; padding: 4px 8px; border-radius: 4px; margin-left: 10px; }
        .status-online { background: rgba(0, 200, 83, 0.2); color: var(--success); }
        .status-offline { background: rgba(255, 61, 0, 0.2); color: var(--danger); }
    </style>
</head>
<body>

<div id="login-overlay" class="overlay" style="display: flex;">
    <div class="modal" style="text-align: center; max-width: 300px;">
        <h2>Sblocca</h2>
        <input type="password" id="login-password" placeholder="Password">
        <button class="btn btn-primary" style="width:100%" onclick="verificaLogin()">Entra</button>
        <p style="font-size: 0.6rem; color: #444; margin-top: 20px; cursor: pointer;" onclick="localStorage.removeItem('portfolio_config'); location.reload();">Reset Config</p>
    </div>
</div>

<div id="app-content" class="container" style="display:none;">
    <div class="top-bar">
        <div>
            <span id="exchange-info" style="font-size: 0.8rem;">EUR/USD: --</span>
            <span id="status-indicator">Controllo Prezzi...</span>
        </div>
        <div style="display:flex; gap: 8px;">
            <button class="btn btn-outline" onclick="toggleValuta('EUR')">€</button>
            <button class="btn btn-outline" onclick="toggleValuta('USD')">$</button>
            <button class="btn btn-primary" onclick="apriModaleNuovo()">+ Titolo</button>
        </div>
    </div>

    <div class="dashboard">
        <div class="stat-card"><h3>Investito</h3><div id="dash-investito" class="value">--</div></div>
        <div class="stat-card"><h3>Valore Lordo</h3><div id="dash-lordo" class="value">--</div></div>
        <div class="stat-card" style="border-top: 2px solid var(--accent);"><h3>Netto (After-Tax)</h3><div id="dash-netto" class="value" style="color:var(--accent)">--</div></div>
        <div class="stat-card"><h3>Realizzato</h3><div id="dash-realizzato" class="value">--</div></div>
    </div>

    <div class="card-table">
        <table>
            <thead>
                <tr>
                    <th>Titolo</th>
                    <th>Q.tà</th>
                    <th>PMC</th>
                    <th>Prezzo</th>
                    <th>Lordo</th>
                    <th>Netto (Tax)</th>
                    <th>P&L</th>
                    <th style="text-align:right">Azioni</th>
                </tr>
            </thead>
            <tbody id="corpo-tabella"></tbody>
        </table>
    </div>
</div>

<div id="modal-titolo" class="overlay"><div class="modal">
    <h3>Nuovo Asset</h3>
    <input type="text" id="in-ticker" placeholder="Ticker (es: RACE.MI)">
    <select id="in-tipo"><option value="0.26">Azioni/ETF (26%)</option><option value="0.125">Titoli Stato (12.5%)</option></select>
    <select id="in-valuta"><option value="EUR">EUR (€)</option><option value="USD">USD ($)</option></select>
    <button class="btn btn-primary" style="width:100%" onclick="salvaTitolo()">Salva</button>
    <button class="btn btn-outline" style="width:100%; margin-top:10px" onclick="chiudiModali()">Chiudi</button>
</div></div>

<div id="modal-tx" class="overlay"><div class="modal">
    <h3 id="tx-titolo-label">Transazioni</h3>
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
        <select id="tx-tipo"><option value="BUY">Acquisto</option><option value="SELL">Vendita</option></select>
        <input type="date" id="tx-data">
        <input type="number" id="tx-qta" placeholder="Q.tà">
        <input type="number" id="tx-prezzo" placeholder="Prezzo">
        <input type="number" id="tx-comm" value="7.00" placeholder="Comm.">
    </div>
    <button class="btn btn-primary" style="width:100%; margin-top:10px" onclick="aggiungiTransazione()">Registra</button>
    <div id="tx-history" style="margin-top:15px; max-height: 200px; overflow-y:auto;"></div>
    <button class="btn btn-outline" style="width:100%; margin-top:10px" onclick="chiudiModali()">Chiudi</button>
</div></div>

<script>
    let CONFIG = { dbUrl: '', password: '' };
    let portafoglio = {}; let prezziLive = {};
    let cambioEURUSD = 1.08; let visualizzaIn = 'EUR'; let activeId = null;

    window.onload = () => {
        const c = localStorage.getItem('portfolio_config');
        if(!c) {
            const u = prompt("URL Firebase:"); const p = prompt("Password:");
            if(u && p) { localStorage.setItem('portfolio_config', JSON.stringify({dbUrl: u.endsWith('/')?u:u+'/', password:p})); location.reload(); }
        } else CONFIG = JSON.parse(c);
    };

    function verificaLogin() {
        if(document.getElementById('login-password').value === CONFIG.password) {
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('app-content').style.display = 'block';
            avviaApp();
        } else alert("Password errata");
    }

    async function avviaApp() {
        document.getElementById('corpo-tabella').innerHTML = '<tr><td colspan="8" style="text-align:center">Sincronizzazione...</td></tr>';
        await aggiornaCambio();
        await caricaDati();
        await aggiornaPrezzi();
        renderTabella();
    }

    async function aggiornaCambio() {
        try { const r = await fetch('https://open.er-api.com/v6/latest/EUR'); const d = await r.json(); cambioEURUSD = d.rates.USD; document.getElementById('exchange-info').innerText = "EUR/USD: " + cambioEURUSD.toFixed(4); } catch(e){}
    }

    async function caricaDati() {
        try { const r = await fetch(CONFIG.dbUrl + "portafoglio_v3.json"); portafoglio = (r.ok) ? await r.json() : {}; } catch(e){ portafoglio = {}; }
    }

    async function salvaDati() {
        await fetch(CONFIG.dbUrl + "portafoglio_v3.json", { method: 'PUT', body: JSON.stringify(portafoglio) });
        renderTabella();
    }

    async function aggiornaPrezzi() {
        const indicator = document.getElementById('status-indicator');
        const ids = Object.keys(portafoglio);
        if(ids.length === 0) { indicator.innerText = "Pronto"; return; }

        const fetchWithTimeout = (id) => {
            const t = portafoglio[id].ticker;
            // Usiamo un proxy CORS differente e più veloce
            const url = `https://api.allorigins.win/get?url=${encodeURIComponent('https://query1.finance.yahoo.com/v8/finance/chart/' + t)}`;
            
            return Promise.race([
                fetch(url).then(r => r.json()).then(d => {
                    const y = JSON.parse(d.contents);
                    prezziLive[id] = y.chart.result[0].meta.regularMarketPrice;
                }),
                new Promise((_, reject) => setTimeout(() => reject(new Error('Timeout')), 5000))
            ]);
        };

        try {
            await Promise.allSettled(ids.map(id => fetchWithTimeout(id)));
            indicator.innerText = "Prezzi Aggiornati";
            indicator.className = "status-online";
        } catch(e) {
            indicator.innerText = "Errore API (Prezzi stimati)";
            indicator.className = "status-offline";
        }
    }

    function calcola(id) {
        let qta = 0, costo = 0, real = 0;
        const txs = (portafoglio[id].transazioni || []).sort((a,b) => new Date(a.data) - new Date(b.data));
        txs.forEach(tx => {
            const q = parseFloat(tx.qta), p = parseFloat(tx.prezzo), c = parseFloat(tx.comm || 0);
            if(tx.tipo === 'BUY') { qta += q; costo += (q*p)+c; }
            else { const pmc = qta > 0 ? costo/qta : 0; real += (p*q)-(pmc*q)-c; costo -= (pmc*q); qta -= q; }
        });
        return { qta, pmc: qta > 0 ? costo/qta : 0, real, inv: costo };
    }

    function renderTabella() {
        const tbody = document.getElementById('corpo-tabella'); tbody.innerHTML = '';
        let tInv = 0, tLordo = 0, tNetto = 0, tReal = 0;
        const s = visualizzaIn === 'EUR' ? '€' : '$';

        Object.keys(portafoglio).forEach(id => {
            const t = portafoglio[id], m = calcola(id), live = prezziLive[id] || m.pmc;
            const val = t.valuta || 'EUR', lordo = m.qta * live, pnl = lordo - m.inv;
            const plus = Math.max(0, lordo - m.inv - 7);
            const netto = lordo - (plus * parseFloat(t.tax || 0.26)) - 7;

            tInv += converti(m.inv, val, visualizzaIn); tLordo += converti(lordo, val, visualizzaIn);
            tNetto += converti(netto, val, visualizzaIn); tReal += converti(m.real, val, visualizzaIn);

            tbody.innerHTML += `<tr>
                <td><b>${t.ticker}</b></td>
                <td>${m.qta.toFixed(2)}</td><td>${m.pmc.toFixed(2)}</td><td>${live.toFixed(2)}</td>
                <td>${s}${converti(lordo,val,visualizzaIn).toLocaleString()}</td>
                <td style="color:var(--accent)">${s}${converti(netto,val,visualizzaIn).toLocaleString()}</td>
                <td class="${pnl>=0?'pos':'neg'}">${converti(pnl,val,visualizzaIn).toFixed(2)}</td>
                <td style="text-align:right">
                    <button class="btn btn-outline" onclick="apriTx('${id}')">Storico</button>
                    <button class="btn btn-outline" style="color:var(--danger)" onclick="eliminaT('${id}')">🗑️</button>
                </td>
            </tr>`;
        });

        document.getElementById('dash-investito').innerText = s + tInv.toLocaleString();
        document.getElementById('dash-lordo').innerText = s + tLordo.toLocaleString();
        document.getElementById('dash-netto').innerText = s + tNetto.toLocaleString();
        document.getElementById('dash-realizzato').innerText = s + tReal.toLocaleString();
    }

    function converti(v, da, a) { return (da===a)?v : (da==='EUR'? v*cambioEURUSD : v/cambioEURUSD); }
    function apriModaleNuovo() { document.getElementById('modal-titolo').style.display='flex'; }
    function chiudiModali() { document.querySelectorAll('.overlay').forEach(o => o.style.display='none'); }
    async function salvaTitolo() {
        const t = document.getElementById('in-ticker').value.toUpperCase(); if(!t) return;
        portafoglio["ID"+Date.now()] = { ticker: t, transazioni: [], valuta: document.getElementById('in-valuta').value, tax: document.getElementById('in-tipo').value };
        await salvaDati(); chiudiModali(); avviaApp();
    }
    function apriTx(id) { activeId = id; document.getElementById('tx-titolo-label').innerText = portafoglio[id].ticker; renderStorico(); document.getElementById('modal-tx').style.display='flex'; }
    function renderStorico() {
        const h = document.getElementById('tx-history'); h.innerHTML = '';
        portafoglio[activeId].transazioni.forEach((tx, i) => {
            h.innerHTML += `<div style="display:flex; justify-content:space-between; font-size:0.7rem; padding:5px; border-bottom:1px solid #222">
                <span>${tx.tipo} ${tx.data}</span><span>${tx.qta}@${tx.prezzo}</span><button onclick="eliminaTx(${i})" style="color:red; background:none; border:none;">X</button>
            </div>`;
        });
    }
    async function aggiungiTransazione() {
        const q = document.getElementById('tx-qta').value, p = document.getElementById('tx-prezzo').value;
        if(!q || !p) return;
        portafoglio[activeId].transazioni.push({ tipo: document.getElementById('tx-tipo').value, data: document.getElementById('tx-data').value, qta: parseFloat(q), prezzo: parseFloat(p), comm: parseFloat(document.getElementById('tx-comm').value) });
        await salvaDati(); renderStorico();
    }
    async function eliminaTx(i) { portafoglio[activeId].transazioni.splice(i,1); await salvaDati(); renderStorico(); }
    async function eliminaT(id) { if(confirm("Elimina?")) { delete portafoglio[id]; await salvaDati(); } }
    function toggleValuta(v) { visualizzaIn = v; renderTabella(); }
</script>
</body>
</html>
